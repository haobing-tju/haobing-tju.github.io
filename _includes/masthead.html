<nav class="masthead">
  <div class="masthead-inner">
    <a class="site-title" href="{{ '/' | relative_url }}">Homepage</a>
    <button class="menu-toggle" aria-label="Toggle menu">☰</button>
    <div class="nav-links">
      {% for link in site.data.navigation.main %}
        <a href="{{ link.url | relative_url }}" {% if link.url contains '.pdf' %}target="_blank"{% endif %}>{{ link.title }}</a>
      {% endfor %}
    </div>
    <button class="lang-toggle" id="langToggle" aria-label="Toggle language">中文</button>
  </div>
</nav>
